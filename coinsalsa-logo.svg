<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="ring" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%"   stop-color="#cc3300"/>
      <stop offset="20%"  stop-color="#ff5500"/>
      <stop offset="48%"  stop-color="#7a1010"/>
      <stop offset="52%"  stop-color="#0c1a60"/>
      <stop offset="80%"  stop-color="#1a6fc4"/>
      <stop offset="100%" stop-color="#55aaff"/>
    </linearGradient>
    <radialGradient id="glowL" cx="18%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#ff4400" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ff4400" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowR" cx="82%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#2277ff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#2277ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Border ring -->
  <circle cx="100" cy="100" r="99" fill="url(#ring)"/>
  <!-- Black base -->
  <circle cx="100" cy="100" r="93" fill="#080808"/>
  <!-- Fire glow left -->
  <circle cx="100" cy="100" r="93" fill="url(#glowL)"/>
  <!-- Electric glow right -->
  <circle cx="100" cy="100" r="93" fill="url(#glowR)"/>
  <!-- "coin" white + "salsa" orange on same baseline -->
  <text x="100" y="108" text-anchor="middle"
        font-family="'Inter','Helvetica Neue',Arial,sans-serif"
        font-weight="900" font-size="46" letter-spacing="-1.5">
    <tspan fill="#ffffff">coin</tspan><tspan fill="#e85500">salsa</tspan>
  </text>
  <!-- tagline -->
  <text x="100" y="128" text-anchor="middle"
        font-family="'Inter','Helvetica Neue',Arial,sans-serif"
        font-weight="400" font-size="11.5" fill="#777777" letter-spacing="0.8">
    crypto • RWA • lifestyle
  </text>
</svg>
